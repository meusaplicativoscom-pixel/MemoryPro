<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<meta charset="UTF-8">
<title>рЯІ† Memory Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root {
  --bg: #0f0f0f;
  --card: #1c1c1c;
  --accent: #6c5ce7;
  --text: #000;
  --white: #fff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--white);
  text-align: center;
}

.container {
  max-width: 900px;
  width: 100%;
  margin: auto;
  padding: 15px;
}

h1 { margin: 10px 0; }

button {
  background: linear-gradient(145deg, #7d6bff, #5a4de0);
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 4px 0 #4b3fc1, 0 6px 10px rgba(0,0,0,0.4);
  transition: all 0.15s ease;
}
button:hover { transform: translateY(-2px); }
button:active { transform: translateY(4px); box-shadow: 0 1px 0 #4b3fc1; }

.game {
  display: grid;
  gap: 8px;
  margin-top: 20px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.card {
  width: 100%;
  aspect-ratio: 1/1;
  max-width: 70px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
  cursor: pointer;
}

.card.flipped { transform: rotateY(180deg); }

.card .front, .card .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  font-size: 28px;
}

.front { background: #fff; color: #000; transform: rotateY(180deg);}
.back { background: var(--card); }

.card.match {
  animation: brilho 0.5s;
  box-shadow: 0 0 15px #00ffcc;
}
@keyframes brilho { 50% { transform: scale(1.1); } }

@media(max-width:600px){ .card{max-width:60px;} }
</style>
</head>

<body>
<div class="container">
<h1>рЯІ† Memory Pro</h1>

<!-- LOGIN -->
<div id="loginDiv">
  <input type="text" id="playerName" placeholder="Nome">
  <input type="password" id="playerPass" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
  <button onclick="entrarVisitante()">Visitante</button>
</div>

<!-- JOGO -->
<div id="gameDiv" style="display:none;">
  <div class="controls">
    <button onclick="salvarESair()">рЯТЊ Salvar e Sair</button>
    <button onclick="setModo('single')">1 Jogador</button>
    <button onclick="setModo('multi')">2 Jogadores</button>
    <button onclick="toggleDificuldade()">рЯФ• Dif√≠cil</button>
    <button onclick="startGame()">Reiniciar</button>
    <br><br>
    <select id="temaEscolhido">
      <option value="">рЯО≤ Tema aleat√≥rio</option>
      <option value="frutas">рЯНО Frutas</option>
      <option value="esportes">вЪљ Esportes</option>
      <option value="emocoes">рЯША Emo√І√µes</option>
      <option value="comida">рЯНФ Comida</option>
      <option value="animais">рЯРґ Animais</option>
    </select>
  </div>

  <div class="info">
    вП±пЄП <span id="timer">0</span> |
    рЯОѓ <span id="nivel">1</span> |
    рЯІ© <span id="fase">1</span>
  </div>

  <div id="game" class="game"></div>
</div>
</div>

<script>
// ===== TEMAS =====
const temas = {
  frutas:["рЯНО","рЯНМ","рЯНЗ","рЯНУ","рЯНН","рЯ•Э","рЯНЙ","рЯНТ","рЯ••","рЯНС"],
  animais:["рЯРґ","рЯР±","рЯР≠","рЯРє","рЯР∞","рЯ¶К","рЯРї","рЯРЉ","рЯР®","рЯРѓ"],
  comida:["рЯНХ","рЯНФ","рЯНЯ","рЯМ≠","рЯНњ","рЯН©","рЯН™","рЯОВ","рЯНЂ","рЯН¶"],
  emocoes:["рЯША","рЯШГ","рЯШД","рЯШБ","рЯШЖ","рЯШВ","рЯШН","рЯШО","рЯ§ѓ","рЯ•≥"],
  esportes:["вЪљ","рЯПА","рЯПИ","рЯОЊ","рЯПР","рЯ•К","рЯПКвАНвЩВпЄП","рЯЪівАНвЩВпЄП","рЯПЛпЄПвАНвЩАпЄП","рЯПДвАНвЩВпЄП"]
};

// ===== ESTADO =====
let modo="single", nivelAtual=1, fase=1, modoDificil=false;
let firstCard=null, secondCard=null, lock=false;
let totalPairs=0, foundPairs=0;
let tempo=0, intervalo;

// ===== LOGIN =====
function login(){ document.getElementById("loginDiv").style.display="none"; document.getElementById("gameDiv").style.display="block"; }
function entrarVisitante(){ login(); }

// ===== DIFICULDADE =====
function toggleDificuldade(){ modoDificil=!modoDificil; alert(modoDificil?"рЯФ• Dif√≠cil ON":"рЯЩВ Normal"); }

// ===== MODO =====
function setModo(m){ modo=m; nivelAtual=1; fase=1; startGame(); }

// ===== SALVAR =====
function salvarESair(){
  const dados={nivel:nivelAtual,fase:fase,tempo:tempo,modo:modo};
  localStorage.setItem("memoryProSave",JSON.stringify(dados));
  alert("рЯТЊ Progresso salvo!");
  document.getElementById("gameDiv").style.display="none";
  document.getElementById("loginDiv").style.display="block";
}

// ===== INICIAR JOGO =====
function startGame(){
  let size;
  if(nivelAtual===1){size=4;}
  if(nivelAtual===2){size=6;}
  if(nivelAtual===3){size=8;}
  if(nivelAtual===4){size=8;}

  document.getElementById("nivel").innerText=nivelAtual;
  document.getElementById("fase").innerText=fase;

  let game=document.getElementById("game");
  game.innerHTML="";
  game.style.gridTemplateColumns=`repeat(${size},1fr)`;

  clearInterval(intervalo);
  tempo=30+(nivelAtual*30)-(fase*5);
  if(modoDificil) tempo=Math.floor(tempo*0.6);
  document.getElementById("timer").innerText=tempo;

  intervalo=setInterval(()=>{
    if(tempo>0){ tempo--; document.getElementById("timer").innerText=tempo; }
    else {
      clearInterval(intervalo);

      // рЯФД vira todas as cartas de volta
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("flipped"));
      firstCard=null; secondCard=null; lock=false;

      setTimeout(()=>{
        let continuar=confirm("вП∞ Tempo acabou!\nOK = Continuar\nCancelar = Parar");
        if(continuar){ startGame(); }
        else {
          document.getElementById("gameDiv").style.display="none";
          document.getElementById("loginDiv").style.display="block";
        }
      },300);
    }
  },1000);

  // ===== SELE√З√ГO DE CARTAS =====
  let temaSelecionado=document.getElementById("temaEscolhido").value;
  let base;
  if(temaSelecionado){ base=temas[temaSelecionado]; }
  else { base=[]; Object.values(temas).forEach(arr=>base.push(...arr)); }

  totalPairs=Math.min((size*size)/2, base.length);
  let selected=shuffle([...base]).slice(0,totalPairs);
  let cards=shuffle([...selected,...selected]);

  foundPairs=0; firstCard=null; secondCard=null; lock=false;

  cards.forEach(symbol=>{
    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<div class="front">${symbol}</div><div class="back"></div>`;
    card.onclick=()=>flipCard(card);
    game.appendChild(card);
  });
}

// ===== VIRAR CARTA =====
function flipCard(card){
  if(lock||card.classList.contains("flipped")) return;
  card.classList.add("flipped");

  if(!firstCard){firstCard=card; return;}
  secondCard=card;

  let s1=firstCard.innerText, s2=secondCard.innerText;

  if(s1===s2){
    firstCard.classList.add("match");
    secondCard.classList.add("match");
    foundPairs++; firstCard=null; secondCard=null;

    if(foundPairs===totalPairs){
      clearInterval(intervalo);
      setTimeout(()=>{
        fase++; if(fase>4){fase=1;nivelAtual++;}
        if(nivelAtual>4){alert("рЯОЙ Zerou!"); nivelAtual=1;}
        startGame();
      },500);
    }
  } else {
    lock=true;
    setTimeout(()=>{
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
      firstCard=null; secondCard=null; lock=false;
    },800);
  }
}

// ===== EMBARALHAR =====
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ===== AUTOLOAD =====
window.onload=()=>{
  let save=localStorage.getItem("memoryProSave");
  if(save){
    let dados=JSON.parse(save);
    nivelAtual=dados.nivel; fase=dados.fase; modo=dados.modo;
    document.getElementById("loginDiv").style.display="none";
    document.getElementById("gameDiv").style.display="block";
    startGame();
  }
};
</script>
<button id="btnInstall" style="display:none;">рЯУ≤ Instalar App</button>
<script>
let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block"; // mostra o bot√£o
});

btnInstall.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("Resultado da instala√І√£o:", outcome);
    deferredPrompt = null;
    btnInstall.style.display = "none";
  }
});

// Registrar o Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
